    <main class="container">
      <header class="hero">
        <p class="badge">Lizard Face Match</p>
        <a href="/" class="home-link">허브로 돌아가기</a>
        <h1>나와 닮은 도마뱀 찾기</h1>
        <p class="subtitle">사진 한 장으로 찾는 당신의 도마뱀 페르소나</p>
        <div class="step-pills" aria-label="진행 단계">
          <span class="step-pill is-active">1. 이름</span>
          <span class="step-pill">2. 사진</span>
          <span class="step-pill">3. 결과</span>
        </div>
      </header>

      <section class="ad-section" id="adTopSection" hidden>
        <ins class="adsbygoogle ad-slot" id="adTopSlot" style="display:block"></ins>
      </section>

      <section class="name-panel" id="namePanel">
        <h2>이름 2글자를 입력해 주세요</h2>
        <p class="name-help">결과 카드와 공유 문구에 이름이 반영됩니다.</p>
        <div class="name-actions">
          <input id="userNameInput" class="name-input" maxlength="2" placeholder="예: 민수" />
          <button id="startTestBtn" class="primary-btn" type="button">테스트 시작</button>
        </div>
      </section>

      <section class="upload-panel" id="uploadPanel" hidden>
        <input type="file" id="photoInput" accept="image/*" hidden />
        <div class="upload-drop" id="uploadDrop" role="button" tabindex="0" aria-label="사진 업로드">
          <span class="upload-title">사진 업로드</span>
          <span class="upload-desc">클릭하거나 이미지를 끌어다 놓으세요</span>
        </div>

        <div class="preview-wrap" id="previewWrap" hidden>
          <img id="previewImage" alt="업로드 미리보기" />
          <div class="analyze-actions">
            <button id="analyzeBtn" class="primary-btn" type="button">닮은 도마뱀 분석하기</button>
            <button id="retryBtn" class="secondary-btn" type="button">다른 사진 선택</button>
          </div>
          <p class="status" id="analyzeStatus">대기 중</p>
        </div>
      </section>

      <section class="result-panel" id="resultPanel" hidden>
        <h2>분석 결과</h2>
        <p class="result-owner" id="resultOwner">-</p>
        <article class="result-card">
          <img id="lizardArtImage" class="result-image" alt="결과 도마뱀 이미지" />
          <div class="result-head">
            <h3 id="lizardName">-</h3>
            <span class="score" id="matchScore">유사도 0%</span>
          </div>
          <div class="tag-list" id="lizardTags"></div>
          <p id="lizardDesc">결과 설명이 여기에 표시됩니다.</p>
        </article>
        <div class="top-matches">
          <h3>Top 3 닮은 도마뱀</h3>
          <ol id="topMatches"></ol>
        </div>

        <section class="ad-section result-ad" id="adResultSection" hidden>
          <ins class="adsbygoogle ad-slot" id="adResultSlot" style="display:block"></ins>
        </section>

        <div class="share-actions">
          <button type="button" id="shareCommon" class="secondary-btn">링크 공유</button>
          <button type="button" id="shareCard" class="secondary-btn">결과 카드 저장</button>
          <button type="button" id="shareKakao" class="kakao-btn">카카오톡 공유</button>
          <button type="button" id="shareInsta" class="secondary-btn">인스타 안내</button>
        </div>
        <p class="hint" id="shareHint"></p>
      </section>
