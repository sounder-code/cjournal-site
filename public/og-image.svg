<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">마진계산소</title>
  <desc id="desc">판매, 생활비, 금융 운영 계산기를 빠르게 찾는 마진계산소</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.55" stop-color="#f7f9f8" />
      <stop offset="1" stop-color="#eef5ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#17261f" flood-opacity="0.14" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="76" y="76" width="1048" height="478" rx="24" fill="#ffffff" filter="url(#shadow)" />
  <rect x="118" y="124" width="238" height="54" rx="10" fill="#10231b" />
  <text x="148" y="160" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="28" font-weight="900" fill="#ffffff">마진계산소</text>
  <text x="118" y="260" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="76" font-weight="950" fill="#17261f">숫자로 먼저 계산하는</text>
  <text x="118" y="350" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="76" font-weight="950" fill="#2563a7">마진계산소</text>
  <text x="122" y="420" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="30" font-weight="700" fill="#5f6d66">판매 마진, 생활비 계약, 대출 상환, 운영 비용을 한곳에서 계산합니다.</text>
  <g transform="translate(782 136)">
    <rect width="268" height="340" rx="18" fill="#10231b" />
    <rect x="26" y="30" width="216" height="58" rx="10" fill="#f8faf9" />
    <rect x="26" y="108" width="216" height="58" rx="10" fill="#f8faf9" opacity="0.9" />
    <rect x="26" y="186" width="216" height="58" rx="10" fill="#f8faf9" opacity="0.82" />
    <rect x="26" y="270" width="96" height="34" rx="8" fill="#16824f" />
    <rect x="140" y="270" width="102" height="34" rx="8" fill="#2f6686" />
    <text x="46" y="68" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="900" fill="#17261f">순이익</text>
    <text x="46" y="146" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="900" fill="#17261f">월 부담</text>
    <text x="46" y="224" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="900" fill="#17261f">총 비용</text>
  </g>
</svg>
