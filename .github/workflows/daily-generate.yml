name: Daily Content Generate

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-generate.yml"
  schedule:
    - cron: "0 21 * * *" # 06:00 Asia/Seoul
    - cron: "0 3 * * *"  # 12:00 Asia/Seoul
  workflow_dispatch:

concurrency:
  group: cjournal-daily-generate
  cancel-in-progress: true

jobs:
  generate:
    runs-on: [self-hosted, macOS, ARM64, cjournal]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check generation toggle
        id: toggle
        env:
          GENERATION_ENABLED: ${{ secrets.GENERATION_ENABLED }}
        run: |
          if [ "${GENERATION_ENABLED:-true}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate keywords
        if: steps.toggle.outputs.enabled == 'true'
        env:
          MIN_COMMERCIAL_SCORE: 2
        run: npm run gen:keywords

      - name: Generate articles
        if: steps.toggle.outputs.enabled == 'true'
        env:
          ARTICLE_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1
          ARTICLE_COUNT: 10
          ARTICLE_PARALLELISM: 2
          ARTICLE_MAX_ATTEMPTS: 2
          RETRY_BACKOFF_MS: 1200
          TITLE_SIMILARITY_THRESHOLD: 0.7
          MIN_WORD_COUNT: 900
          GEMINI_TIMEOUT_MS: 35000
          OPENAI_TIMEOUT_MS: 35000
        run: npm run gen:articles

      - name: Quality gate
        if: steps.toggle.outputs.enabled == 'true'
        env:
          MIN_WORD_COUNT: 900
          MIN_KEPT_COUNT: 5
        run: npm run quality

      - name: Generate post images
        if: steps.toggle.outputs.enabled == 'true'
        env:
          IMAGE_PROVIDER: flux-local
          FLUX_LOCAL_API_URL: ${{ vars.FLUX_LOCAL_API_URL }}
          FLUX_LOCAL_API_KEY: ${{ secrets.FLUX_LOCAL_API_KEY }}
          FLUX_LOCAL_MODEL: ${{ vars.FLUX_LOCAL_MODEL }}
          FLUX_LOCAL_STEPS: 8
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NANO_BANANA_MODEL: gemini-2.5-flash-image
          IMAGES_PER_POST: 2
          IMAGE_PARALLELISM: 2
          IMAGE_TIMEOUT_MS: 30000
        run: npm run gen:post-images

      - name: Validate post images
        if: steps.toggle.outputs.enabled == 'true'
        env:
          MIN_IMAGES_PER_POST: 2
          MAX_IMAGES_PER_POST: 2
        run: npm run check:images

      - name: Build post index
        if: steps.toggle.outputs.enabled == 'true'
        run: npm run build:index

      - name: Build site
        if: steps.toggle.outputs.enabled == 'true'
        run: npm run build

      - name: Commit and push
        if: steps.toggle.outputs.enabled == 'true'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add src/content/posts src/content/keywords/today.json src/content/posts-index.json public/assets/posts logs
          git commit -m "chore(content): daily article generation"
          git push origin main

      - name: Upload generation logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generation-logs
          path: logs/
          if-no-files-found: ignore
