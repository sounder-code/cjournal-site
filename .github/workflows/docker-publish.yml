name: Build and Publish Docker Image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cjournal-docker-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          build-args: |
            PUBLIC_SITE_URL=${{ vars.PUBLIC_SITE_URL || 'https://cjournal.kr' }}
            PUBLIC_NAVER_ANALYTICS_ID=${{ vars.PUBLIC_NAVER_ANALYTICS_ID || '24eb41c656c0500' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check whether search documents changed
        id: search-documents
        shell: bash
        run: |
          if git diff-tree --no-commit-id --name-only -r HEAD | grep -Eq '^(public/dd31d55254614118988122a86e38eb19\.txt|public/data/apartments/|src/pages/apartments/|src/pages/sitemap\.xml\.ts|src/lib/apartment|src/layouts/BaseLayout\.astro)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for production release
        if: steps.search-documents.outputs.changed == 'true'
        shell: bash
        run: |
          for attempt in {1..60}; do
            if [ "$(curl --silent --show-error --fail https://danjipyo.kr/dd31d55254614118988122a86e38eb19.txt || true)" = "dd31d55254614118988122a86e38eb19" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Production did not expose the IndexNow key within 10 minutes" >&2
          exit 1

      - name: Notify Naver IndexNow
        if: steps.search-documents.outputs.changed == 'true'
        env:
          PUBLIC_SITE_URL: https://danjipyo.kr
        run: node scripts/submit-indexnow.mjs
