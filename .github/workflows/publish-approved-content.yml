name: Publish Approved Content

on:
  schedule:
    # Tuesday and Friday at 05:10 Asia/Seoul (UTC+9).
    - cron: "10 20 * * 1,4"
  workflow_dispatch:

concurrency:
  group: cjournal-approved-content
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Publish one approved article
        id: publish
        run: npm run content:publish-approved

      - name: Validate site
        if: steps.publish.outputs.published == 'true'
        run: |
          npm run build:index
          npm run typecheck
          npm run build

      - name: Commit and push
        if: steps.publish.outputs.published == 'true'
        run: |
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add content-queue src/content/posts src/content/posts-index.json public/assets/posts
          git commit -m "chore(content): publish approved article"
          git push origin main
